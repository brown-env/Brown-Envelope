<head>

  </div>
  <main class="video-page">
    <div class="video-embed" aria-label="Brown Envelope video">

        width="560"
        height="315"
        src="https://www.youtube.com/embed/7mlBO6wLM_k?si=1Tzx9CF22S528nCe"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>

          <div class="flap">
            <span class="seal-text seal-text--flap">5th of March</span>
          </div>
          <span class="seal-text seal-text--body">5th of March</span>

      </div>
